schema-version: 1
description: Convert localization between BaseLib source and game directory layouts.
parameters:
  namespace-top:
    type: string
    description: Top-level BaseLib namespace.
    position: 0
  source-path:
    type: string
    description: Source localization directory.
    position: 1
  game-path:
    type: string
    description: Game localization directory.
    position: 2
  source-format:
    type: string
    description: Structured source localization format.
    default: yaml
  game-format:
    type: string
    description: Game localization format.
    default: flat-json
  minionlib-components:
    type: bool
    description: Enable MinionLib component compatibility conversion.
    flag: true
    default: false
  minionlib-namespace-top:
    type: string
    description: MinionLib component namespace; leave empty to use namespace-top.
    default: ""
  reversed:
    type: bool
    description: Convert game localization back to source form.
    flag: true
    default: false
steps:
  - if:
      not: $(reversed)
    input:
      kind: $(source-format)
      path: $(source-path)
  - if:
      not: $(reversed)
    model-id:
      kind: baselib
      namespace-top: $(namespace-top)
  - if:
      all:
        - not: $(reversed)
        - $(minionlib-components)
        - equals: [$(minionlib-namespace-top), ""]
    compat:
      kind: [minionlib-component, to-game]
      namespace-top: $(namespace-top)
  - if:
      all:
        - not: $(reversed)
        - $(minionlib-components)
        - not:
            equals: [$(minionlib-namespace-top), ""]
    compat:
      kind: [minionlib-component, to-game]
      namespace-top: $(minionlib-namespace-top)
  - if:
      not: $(reversed)
    output:
      kind: $(game-format)
      path: $(game-path)

  - if: $(reversed)
    input:
      kind: $(game-format)
      path: $(game-path)
  - if:
      all:
        - $(reversed)
        - $(minionlib-components)
        - equals: [$(minionlib-namespace-top), ""]
    compat:
      kind: [minionlib-component, to-source]
      namespace-top: $(namespace-top)
  - if:
      all:
        - $(reversed)
        - $(minionlib-components)
        - not:
            equals: [$(minionlib-namespace-top), ""]
    compat:
      kind: [minionlib-component, to-source]
      namespace-top: $(minionlib-namespace-top)
  - if: $(reversed)
    model-id:
      kind: baselib
      namespace-top: $(namespace-top)
      reversed: true
  - if: $(reversed)
    output:
      kind: $(source-format)
      path: $(source-path)
